name: OpenSSF Scorecard
on:
  # Allows manual triggering for Task 3 testing
  workflow_dispatch: 
  branch_protection_rule:
  schedule:
    - cron: '20 7 * * 2'
  push:
    # Changed back to "master" to match your working configuration
    branches: [ "master" ]

# High Quality: Global permissions set to read-all as a safe baseline
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Required to upload results to the Security tab for Task 3
      security-events: write 
      # Required to publish results to OpenSSF and get the badge for Task 2
      id-token: write
      # Necessary for checking out code in some configurations
      contents: read

    steps:
      - name: "Checkout code"
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: "Run analysis"
        # Using v2.4.1 (the latest stable version you had working)
        uses: ossf/scorecard-action@f49aabe0b5af0936a0987cfb85d86b75731b0186 # v2.4.1
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: "Upload artifact"
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea23f8d3e55df21b8833023ee # v4.4.3
        with:
          name: SARIF_file
          path: results.sarif
          retention-days: 5

      - name: "Upload to code-scanning"
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
